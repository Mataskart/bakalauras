name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build web app
        run: |
          cd web
          npm ci
          npm run build

      - name: Deploy backend and prepare web dir
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/bakalauras
            git pull origin main
            rm -rf web/dist
            mkdir -p web/dist
            cd backend
            composer install --no-dev --optimize-autoloader
            php bin/console doctrine:migrations:migrate --no-interaction --env=prod
            php bin/console cache:clear --env=prod
            php bin/console cache:warmup --env=prod

      - name: Deploy web app (upload dist)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: 'web/dist'
          target: '/var/www/bakalauras/web'

      - name: Fix web dist permissions
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo chown -R www-data:www-data /var/www/bakalauras/web
            sudo chmod -R a+rX /var/www/bakalauras/web
