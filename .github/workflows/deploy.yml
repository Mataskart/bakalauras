name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build web app
        run: |
          cd web
          npm ci
          npm run build

      # VPS must allow inbound SSH (port 22) from the internet. If you see "dial tcp :22: i/o timeout",
      # check the VPS firewall (e.g. ufw allow 22/tcp && ufw reload) and that the host is reachable.
      - name: Deploy backend and prepare web dir
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 60s
          command_timeout: 5m
          script: |
            cd /var/www/bakalauras
            git pull origin main
            rm -rf web/dist
            mkdir -p web/dist
            cd backend
            composer install --no-dev --optimize-autoloader
            php bin/console doctrine:migrations:migrate --no-interaction --env=prod
            php bin/console cache:clear --env=prod
            php bin/console cache:warmup --env=prod

      - name: Deploy web app (upload dist)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 60s
          source: 'web/dist'
          target: '/var/www/bakalauras'
          overwrite: true

