framework:
    cache:
        # Unique name of your app: used to compute stable namespaces for cache keys.
        #prefix_seed: your_vendor_name/app_name

        # The "app" cache stores to the filesystem by default.
        app: cache.adapter.filesystem

        # Leaderboard: Redis with 60s TTL. Uses REDIS_URL (e.g. redis://localhost:6379).
        # In dev/test without Redis, use adapter: cache.adapter.filesystem temporarily.
        pools:
            leaderboard:
                adapter: cache.adapter.redis
                default_lifetime: 60
                provider: '%env(REDIS_URL)%'

# In test we inject cache.app for leaderboard (see services.yaml when@test) so Redis is not required.
