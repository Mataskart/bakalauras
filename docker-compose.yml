services:
  db:
    image: postgres:16
    container_name: bakalauras_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: bakalauras
      POSTGRES_USER: bakalauras
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data: