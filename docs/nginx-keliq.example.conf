# keliq.lt – SPA at /, API at /api
# Replace the 443 server block on the VPS with the one below.

server {
    listen 80;
    server_name keliq.lt www.keliq.lt;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name keliq.lt www.keliq.lt;

    ssl_certificate /etc/letsencrypt/live/keliq.lt/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/keliq.lt/privkey.pem;

    # --- SPA (web app): homepage, /login, /contacts, etc. ---
    root /var/www/bakalauras/web/dist;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- API: Symfony. All /api/* go straight to PHP (no try_files so no wrong location match). ---
    location ^~ /api {
        include fastcgi_params;
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/bakalauras/backend/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param DOCUMENT_ROOT /var/www/bakalauras/backend/public;
    }

    location ~ \.php$ {
        return 404;
    }
}
