# Example Nginx config for keliq.lt
# - / → static web app (SPA) from web/dist
# - /api → Symfony backend (PHP-FPM)
#
# Your current 404 happens because everything is sent to Symfony; Symfony has no route for /.
# Fix: serve the SPA for / and only send /api to PHP.
#
# Steps on VPS:
# 1. Find your current config:  ls /etc/nginx/sites-enabled/  or  cat /etc/nginx/nginx.conf
# 2. Edit the server block for keliq.lt (or replace with this), then:
#    sudo nginx -t && sudo systemctl reload nginx

server {
    listen 443 ssl http2;
    server_name keliq.lt www.keliq.lt;

    ssl_certificate     /etc/letsencrypt/live/keliq.lt/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/keliq.lt/privkey.pem;

    # --- Web app (SPA): homepage, /login, /contacts, etc. ---
    root /var/www/bakalauras/web/dist;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- API: Symfony (PHP-FPM). All /api/* go to the backend. ---
    location ^~ /api {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/bakalauras/backend/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param REQUEST_URI $request_uri;
    }
}

# If you have a separate server { listen 80; ... } for HTTP, keep the redirect:
# return 301 https://$host$request_uri;
